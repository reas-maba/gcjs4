<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogBreeds Recognizer V1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }
        
        .upload-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .upload-area:hover,
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        
        .upload-area i {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
            display: block;
        }
        
        .upload-area p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .upload-area small {
            color: #999;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-section {
            margin-top: 30px;
            display: none;
        }
        
        .preview-section.show {
            display: block;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .result-section {
            margin-top: 30px;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-title {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease;
        }
        
        .result-card:hover {
            transform: translateY(-3px);
        }
        
        .result-card .breed-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }
        
        .result-card .confidence {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .confidence-bar {
            width: 150px;
            height: 20px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .confidence-value {
            font-weight: 600;
            color: #333;
            min-width: 60px;
            text-align: right;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading p {
            color: #666;
            font-size: 1.1rem;
        }
        
        .error-message {
            background: #ffebee;
            border-left: 5px solid #f44336;
            padding: 15px;
            border-radius: 5px;
            color: #c62828;
            margin-top: 20px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐕 DogBreeds Recognizer</h1>
            <p>上传狗狗图片，识别品种</p>
        </div>
        
        <div class="upload-box">
            <div class="upload-area" id="uploadArea">
                <i>📷</i>
                <p>点击或拖拽上传狗狗图片</p>
                <small>支持 JPG、PNG 格式</small>
            </div>
            <input type="file" id="fileInput" accept="image/jpeg,image/png">
            
            <div class="preview-section" id="previewSection">
                <img id="previewImage" class="preview-image" alt="Preview">
                <button class="btn-upload" id="btnUpload">开始识别</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>正在识别中...</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="result-section" id="resultSection">
                <h2 class="result-title">识别结果</h2>
                <div id="resultsContainer"></div>
            </div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const btnUpload = document.getElementById('btnUpload');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const resultSection = document.getElementById('resultSection');
        const resultsContainer = document.getElementById('resultsContainer');
        
        let selectedFile = null;
        
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请上传图片文件');
                return;
            }
            
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewSection.classList.add('show');
                resultSection.classList.remove('show');
                errorMessage.classList.remove('show');
            };
            reader.readAsDataURL(file);
        }
        
        btnUpload.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            loading.classList.add('show');
            previewSection.classList.remove('show');
            resultSection.classList.remove('show');
            errorMessage.classList.remove('show');
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            try {
                const response = await fetch('http://localhost:5000/api/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                } else {
                    displayResults(data.predictions);
                }
            } catch (error) {
                showError('识别失败，请确保后端服务已启动');
            } finally {
                loading.classList.remove('show');
            }
        });
        
        function displayResults(predictions) {
            resultsContainer.innerHTML = '';
            
            predictions.forEach((prediction, index) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="breed-name">
                        ${index === 0 ? '🏆 ' : ''}${prediction.breed}
                    </div>
                    <div class="confidence">
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${prediction.confidence}%"></div>
                        </div>
                        <div class="confidence-value">${prediction.confidence}%</div>
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
            
            resultSection.classList.add('show');
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            previewSection.classList.add('show');
        }
    </script>
</body>
</html>
